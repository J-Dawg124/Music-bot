<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Album Tracker (Spotify Login)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-6xl mx-auto">
  <h1 class="text-3xl font-bold mb-4">🎵 Album Tracker (Spotify Login)</h1>

  <!-- Login -->
  <div class="mb-4">
    <button onclick="loginSpotify()" class="flex items-center justify-center gap-3 bg-green-500 hover:bg-green-600 text-black font-semibold px-6 py-3 rounded-full shadow-md transition w-80 mx-auto">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0Zm3.69 11.46a.5.5 0 0 1-.69.17c-1.88-1.15-4.25-1.41-7.05-.77a.5.5 0 1 1-.22-.97c3.03-.7 5.63-.4 7.8.9a.5.5 0 0 1 .16.67Zm.98-2.18a.625.625 0 0 1-.86.2c-2.15-1.32-5.42-1.7-7.96-.93a.625.625 0 1 1-.36-1.2c2.86-.86 6.46-.44 8.98 1.06.3.18.4.57.2.87Zm.08-2.27C10.3 5.49 6.9 5.33 4.5 6.02a.75.75 0 1 1-.41-1.44c2.74-.79 6.5-.63 9.25 1.05a.75.75 0 1 1-.59 1.38Z"/>
      </svg>
      Sign in with Spotify
    </button>
  </div>

  <!-- Search Spotify -->
  <div class="bg-white p-4 rounded-2xl shadow mb-6">
    <h2 class="text-xl mb-2">Search Albums</h2>
    <input id="search" placeholder="Search album or artist" class="border p-2 mr-2 w-64">
    <button onclick="searchSpotify()" class="bg-green-500 text-white px-4 py-2 rounded">Search</button>
  </div>

  <!-- Results -->
  <div id="results" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>

  <!-- Stats -->
  <div class="bg-white p-4 rounded-2xl shadow mb-6">
    <h2 class="text-xl mb-2">📊 Stats</h2>
    <div id="stats" class="grid grid-cols-3 gap-4 text-center"></div>
  </div>

  <!-- Albums -->
  <div id="albums" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
</div>

<script>
const CLIENT_ID = "73e9ce72a9144bccb5be13cf9d78ca11";
const REDIRECT_URI = window.location.origin + window.location.pathname;

let token = null;
let albums = JSON.parse(localStorage.getItem('albums') || '[]');

// LOGIN FLOW (Implicit Grant)
function loginSpotify() {
  const authUrl = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=`;
  window.location = authUrl;
}

// Extract token from URL
function getTokenFromUrl() {
  const hash = window.location.hash;
  if (hash) {
    const params = new URLSearchParams(hash.substring(1));
    token = params.get("access_token");
    window.location.hash = "";
  }
}

getTokenFromUrl();

async function searchSpotify() {
  if (!token) {
    alert("Login first");
    return;
  }

  const query = document.getElementById('search').value;

  const res = await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=album`, {
    headers: { Authorization: `Bearer ${token}` }
  });

  const data = await res.json();
  renderResults(data.albums.items);
}

function renderResults(items) {
  const container = document.getElementById('results');
  container.innerHTML = '';

  items.forEach(a => {
    container.innerHTML += `
      <div class="bg-white p-2 rounded shadow">
        <img src="${a.images[0]?.url}" class="w-full rounded">
        <div class="text-sm font-bold">${a.name}</div>
        <div class="text-xs text-gray-600">${a.artists[0].name}</div>
        <button onclick='addAlbum(${JSON.stringify(a)})' class="bg-blue-500 text-white w-full mt-2 rounded">Add</button>
      </div>
    `;
  });
}

function addAlbum(a) {
  albums.push({
    title: a.name,
    artist: a.artists[0].name,
    image: a.images[0]?.url,
    listened: false,
    rating: '',
    review: ''
  });
  save();
}

function toggleListened(i) {
  albums[i].listened = !albums[i].listened;
  save();
}

function updateReview(i) {
  albums[i].rating = document.getElementById('rating-'+i).value;
  albums[i].review = document.getElementById('review-'+i).value;
  save();
}

function save() {
  localStorage.setItem('albums', JSON.stringify(albums));
  render();
}

function renderStats() {
  const listened = albums.filter(a=>a.listened);

  const ratings = listened.map(a=>parseFloat(a.rating)).filter(r=>!isNaN(r));
  const avg = ratings.length ? (ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(2) : 'N/A';

  const artistCount = {};
  listened.forEach(a=>{
    artistCount[a.artist] = (artistCount[a.artist]||0)+1;
  });

  const top = Object.entries(artistCount)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,3)
    .map(a=>a[0])
    .join('<br>') || 'N/A';

  document.getElementById('stats').innerHTML = `
    <div><b>${albums.length}</b><br>Total</div>
    <div><b>${avg}</b><br>Avg Rating</div>
    <div><b>${top}</b><br>Top Artists</div>
  `;
}

function render() {
  const container = document.getElementById('albums');
  container.innerHTML = '';

  albums.forEach((a,i)=>{
    container.innerHTML += `
      <div class="bg-white p-4 rounded shadow">
        <img src="${a.image}" class="w-24 mb-2">
        <h3>${a.title}</h3>
        <p>${a.artist}</p>
        <button onclick="toggleListened(${i})" class="mt-1 ${a.listened?'bg-green-400':'bg-gray-300'} px-2 py-1 rounded">
          ${a.listened?'Listened':'Not'}
        </button>
        ${a.listened?`
          <input id="rating-${i}" placeholder="Rating" value="${a.rating}" class="border w-full mt-1">
          <textarea id="review-${i}" class="border w-full">${a.review}</textarea>
          <button onclick="updateReview(${i})" class="bg-blue-500 text-white px-2 py-1 mt-1">Save</button>
        `:''}
      </div>
    `;
  });

  renderStats();
}

render();
</script>

</body>
</html>
